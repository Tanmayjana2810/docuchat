# Runs the backend + MongoDB together with one command:
#   docker compose up --build
#
# The frontend is deployed separately (Vercel/Netlify), so it's not included
# here — but you can run it locally with `npm run dev`.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # These override values in the container. Put your real GROQ key in a
      # .env file next to this compose file (compose loads it automatically).
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=ai20_qa
      - DAPPIER_API_KEY=${DAPPIER_API_KEY:-}
      - CHROMA_DIR=/app/storage/chroma
      - UPLOAD_DIR=/app/storage/uploads
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      # Persist embeddings + uploads on the host so they survive restarts.
      - ./backend/storage:/app/storage
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  # Caddy is a reverse proxy that automatically obtains and renews a free
  # HTTPS certificate (Let's Encrypt) for your domain, then forwards traffic
  # to the backend. This is what turns http://<ip>:8000 into https://<domain>.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
